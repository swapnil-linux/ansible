[defaults]
inventory          = inventory
remote_user        = devops
# Uncomment to suppress deprecation warnings during training:
# deprecation_warnings = False

[ssh_connection]
# ControlMaster and ControlPersist speed up repeated connections to the same host
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
