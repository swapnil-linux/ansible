---
# This playbook demonstrates how to run a play only on reachable hosts.
# Play 1: Pings every host in inventory and groups the reachable ones.
# Play 2: Runs the actual work only on hosts that responded.

- name: Check which hosts are reachable
  hosts: all
  gather_facts: false
  tasks:
    - name: Ping host to test reachability
      ansible.builtin.command: ping -c1 {{ inventory_hostname }}
      delegate_to: localhost
      register: ping_result
      ignore_errors: true
      changed_when: false

    - name: Add reachable hosts to the 'reachable' group
      ansible.builtin.group_by:
        key: reachable
      when: ping_result is success

- name: Run your actual play (only on reachable hosts)
  hosts: reachable
  gather_facts: true
  tasks:
    - name: Print hostname
      ansible.builtin.debug:
        msg: "This is {{ ansible_hostname }}"
