---
- name: Create a Docker container and manage it with systemd
  hosts: localhost
  connection: local
  become: true
  vars_files:
    - vars.yml
  tasks:
    - name: Install python3-docker on Red Hat based distributions
      ansible.builtin.yum:
        name: python3-docker
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Install python3-docker on Debian based distributions
      ansible.builtin.apt:
        name: python3-docker
        update_cache: true
      when: ansible_os_family == 'Debian'

    - name: Create Docker container
      community.docker.docker_container:
        name: "{{ name }}"
        image: "{{ image }}"
        ports:
          - "{{ src_port }}:{{ dest_port }}"
        volumes:
          - "{{ src_vol }}:{{ dest_vol }}"
        privileged: "{{ privileged }}"
        state: started
        restart_policy: always

    - name: Create systemd unit file for docker-{{ name }}
      ansible.builtin.template:
        src: systemd.j2
        dest: /etc/systemd/system/docker-{{ name }}.service
        owner: root
        group: root
        mode: '0644'

    - name: Start and enable docker-{{ name }} service via systemd
      ansible.builtin.systemd:
        name: docker-{{ name }}
        state: started
        enabled: true
        daemon_reload: true

    - name: Check container status
      ansible.builtin.command: docker ps
      register: result
      changed_when: false

    - name: Show container status
      ansible.builtin.debug:
        var: result.stdout
